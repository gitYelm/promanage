services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: rbac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rbac_admin}
      POSTGRES_USER: ${POSTGRES_USER:-rbac_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 数据库由 Prisma 统一管理，不再使用 SQL 文件初始化
      # - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      # - ./db/init_data.sql:/docker-entrypoint-initdb.d/02-init_data.sql
      # 端口映射说明：
      # - 生产环境：注释掉端口映射，仅容器内部访问（推荐）
      # - 开发/调试：取消注释，允许本地工具连接（DBeaver、pgAdmin）
      # ports:
      #   - "5433:5432"
    networks:
      - rbac-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbac_admin} -d ${POSTGRES_DB:-rbac_admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    # 端口映射说明：
    # - 生产环境：注释掉端口映射，仅容器内部访问（推荐）
    # - 开发/调试：取消注释，允许本地工具连接（Redis Desktop Manager）
    # ports:
    #   - "6379:6379"
    networks:
      - rbac-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # NestJS 后端服务
  server:
    build:
      context: ./server-nestjs
      dockerfile: Dockerfile
    container_name: rbac-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rbac_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rbac_admin}?schema=public
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_IDLE_TIMEOUT: ${DB_POOL_IDLE_TIMEOUT:-30000}
      DB_POOL_CONNECTION_TIMEOUT: ${DB_POOL_CONNECTION_TIMEOUT:-5000}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-it-in-production}
      # JWT 过期时间由数据库 sys_config 表的 sys.session.timeout 配置，无需环境变量
      LOG_LEVEL: info
      LOG_DIR: logs
      TZ: Asia/Shanghai
    volumes:
      - server_logs:/app/logs
      - ./server-nestjs/uploads:/app/uploads
      - ./server-nestjs/exports:/app/exports
      # Git 提交记录（已提交到仓库作为兜底数据，monorepo.sh 部署时会自动更新为最新）
      - ./server-nestjs/commits.json:/app/commits.json:ro
    # 端口映射说明：
    # - 生产环境：注释掉此端口映射，通过前端 Nginx 反向代理访问（/api -> http://server:3000）
    # - 开发/测试：保留端口映射，方便直接访问 Swagger 文档和移动端调试
    # ports:
    #   - "3000:3000"
    networks:
      - rbac-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue 前端服务
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rbac-web
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8080:80"
    networks:
      - rbac-network
    depends_on:
      - server
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rbac-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  server_logs:
    driver: local
